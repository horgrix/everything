name: "东方财富港股回购离线任务"
type: web
method: GET
iterate:
  var_name: "page"
  values: 
    - 1 
    - 2   
url: "https://hk.eastmoney.com/buyback_{page}.html?code=02400&sdate=&edate="
encoding: 'utf-8'
schedule: "33 20 * * *"
outputs:
  - target_table: "hk_stock_buyback_daily"
    table_schema:
      columns:
        - name: id
          type: INTEGER
          constraint: PRIMARY KEY AUTOINCREMENT
        - name: stat_date
          type: TEXT
        - name: code
          type: TEXT
        - name: volume
          type: TEXT
        - name: high_price
          type: REAL
        - name: low_price
          type: REAL
        - name: avg_price
          type: REAL
        - name: amt_hkd
          type: REAL
        - name: crawled_at
          type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
      indexes:
        - name: idx_uk_code_stat_date
          columns: [code, stat_date]
          unique: true
    parser:
      type: html_table
      row_selector: "table.table.table_striped.center tbody tr"
      fields:
        - name: stat_date
          column: 8
          strip: true
        - name: code
          value: "02400"
        - name: volume
          column: 3
          strip: true
          number_expr_to_int: true
        - name: high_price
          column: 4
          strip: true
          to_number: true
        - name: low_price
          column: 5
          strip: true
          to_number: true
        - name: avg_price
          column: 6
          strip: true
          to_number: true
        - name: amt_hkd
          column: 7
          strip: true
          number_expr_to_int: true
anti_spider:
  enabled: false
  delay:
    - 1
    - 3
  rotate_user_agent: false
  use_proxy: false
retry:
  max_attempts: 3
  backoff_base: 2.0