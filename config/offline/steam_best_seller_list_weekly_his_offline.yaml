name: "Steam游戏热销榜周榜离线任务"
type: csv
file:
  format: csv
  path: "config/data/steam_best_seller_list_weekly_his_20260101-20260723.csv"
  encoding: utf-8-sig
schedule: "35 * * * *"
target_table: "steam_best_seller_list_weekly"
table_schema:
  columns:
    - name: id
      type: INTEGER
      constraint: PRIMARY KEY AUTOINCREMENT
    - name: steam_id
      type: INTEGER
    - name: rank
      type: INTEGER
    - name: region
      type: TEXT
    - name: crawled_at
      type: TEXT NOT NULL DEFAULT (strftime('%Y-%m-%d', 'now', 'localtime'))
  indexes:
    - name: idx_uk_steam_id_region_crawled_at
      columns: [steam_id, region, crawled_at]
      unique: true
parser:
  type: sdk_mapping
  fields:
    - name: steam_id
      source: steam_id
      to_number: true   
    - name: rank
      source: rank
      to_number: true     
    - name: region
      source: region
      strip: true
    - name: crawled_at
      source: crawled_at
      strip: true
      truncate_left: 10
