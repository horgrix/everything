name: "火炬之光S11赛季Steam游戏每天峰值玩家离线任务"
type: csv
file:
  format: csv
  path: "config/data/torchlight_ss11_steam_game_daily_peak_players_20260116-20260416.csv"
  encoding: utf-8-sig
schedule: "35 * * * *"
target_table: "torchlight_ss11_steam_game_peak_players_daily"
table_schema:
  columns:
    - name: id
      type: INTEGER
      constraint: PRIMARY KEY AUTOINCREMENT
    - name: steam_id
      type: INTEGER
    - name: stat_ts
      type: INTEGER
    - name: peak_players
      type: INTEGER
    - name: crawled_at
      type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
  indexes:
    - name: idx_uk_steam_id_stat_ts
      columns: [steam_id, stat_ts]
      unique: true
parser:
  type: sdk_mapping
  fields:
    - name: steam_id
      source: steam_id
      to_number: true   
    - name: stat_ts
      source: stat_ts
      to_number: true     
    - name: peak_players
      source: peak_players
      to_number: true