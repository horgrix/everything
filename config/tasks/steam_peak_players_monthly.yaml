name: "Steam游戏每月峰值玩家采集任务"
type: web
method: GET
iterate:
  var_name: "steam_id"
  values:
    - 1974050    # 火炬之光 国际服
    - 2315040    # 火炬之光 国服
    - 4025700    # 心动小镇 国际服
url: "https://steamcharts.com/app/{steam_id}"
schedule: "0 */6 * * *"
target_table: "steam_game_peak_players_monthly"
table_schema:
  columns:
    - name: id
      type: INTEGER
      constraint: PRIMARY KEY AUTOINCREMENT
    - name: steam_id
      type: INTEGER
    - name: stat_month
      type: TEXT
    - name: avg_players
      type: REAL
    - name: peak_players
      type: INTEGER
    - name: crawled_at
      type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
  indexes:
    - name: idx_uk_steam_id_stat_month
      columns: [steam_id, stat_month]
      unique: true
parser:
  type: html_table
  row_selector: "table.common-table tbody tr"
  fields:
    - name: steam_id
      value: "{steam_id}"
    - name: stat_month
      column: 0
      strip: true
      to_datetime: true
      date_output_format: "%Y-%m-%d"
    - name: avg_players
      column: 1
      strip: true
      to_number: true
    - name: peak_players
      column: 4
      strip: true
      to_number: true
anti_spider:
  enabled: false
  delay:
    - 1
    - 3
  rotate_user_agent: false
  use_proxy: false
retry:
  max_attempts: 3
  backoff_base: 2.0