name: "香港交易所每日做空数据采集任务"
type: web
method: GET
url: "https://www.hkex.com.hk/chi/stat/smstat/ssturnover/ncms/ashtmain_c.htm"
encoding: 'big5hkscs'
schedule: "30 19 * * *"
outputs:
  - target_table: "hk_exchange_short_selling_daily"
    table_schema:
      columns:
        - name: id
          type: INTEGER
          constraint: PRIMARY KEY AUTOINCREMENT
        - name: total_turnover_hkd
          type: TEXT
        - name: all_ss_percentage
          type: TEXT
        - name: ex_exchange_traded_products_ss_percentage
          type: TEXT
        - name: exchange_traded_products_only_ss_percentage
          type: TEXT
        - name: crawled_at
          type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
      indexes:
        - name: idx_uk_crawled_at
          columns: [crawled_at]
          unique: true
    parser:
      type: html_table
      row_selector: "font"
      fields:
        - name: total_turnover_hkd
          regex_extract: '市場總成交[^\d]*HKD\s*([\d,]+)'
        - name: all_ss_percentage
          regex_extract: '賣空所有指定證券佔市場總成交的百分比[^\d]*(\d+%)'
        - name: ex_exchange_traded_products_ss_percentage
          regex_extract: '賣空指定證券（不包括交易所買賣產品）佔市場總成交的百分比[^\d]*(\d+%)'
        - name: exchange_traded_products_only_ss_percentage
          regex_extract: '賣空指定證券（僅限交易所買賣產品）佔市場總成交的百分比[^\d]*(\d+%)'

  - target_table: "hk_stock_short_selling_daily"
    table_schema:
      columns:
        - name: id
          type: INTEGER
          constraint: PRIMARY KEY AUTOINCREMENT
        - name: code
          type: TEXT
        - name: volume
          type: TEXT
        - name: amt_hkd
          type: TEXT
        - name: crawled_at
          type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
      indexes:
        - name: idx_uk_crawled_at
          columns: [crawled_at]
          unique: true
    parser:
      type: html_table
      row_selector: "font"
      fields:
        - name: code
          regex_extract: '(\d{3,4})\s+心動公司[^\d]*([\d,]+)\s+([\d,]+)'
          group: 1
        - name: volume
          regex_extract: '(\d{3,4})\s+心動公司[^\d]*([\d,]+)\s+([\d,]+)'
          group: 2
        - name: amt_hkd
          regex_extract: '(\d{3,4})\s+心動公司[^\d]*([\d,]+)\s+([\d,]+)'
          group: 3
anti_spider:
  enabled: false
  delay:
    - 1
    - 3
  rotate_user_agent: false
  use_proxy: false
retry:
  max_attempts: 3
  backoff_base: 2.0