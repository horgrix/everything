name: "Steam游戏畅销榜小时采集任务"
type: web
method: GET
browser:
  headless: true
  wait_selector: "table._3arZn0BMPzyhcYNADe193m"
  wait_timeout: 15000
  actions:
    - type: "click"
      selector: "button.DialogButton._DialogLayout.Primary.Focusable"
      wait_after: 5000
iterate:
  var_name: "region"
  values: [global,CN,TW,BR,JP,FR,TH,US,KR,HK]
url: "https://store.steampowered.com/charts/topsellers/{region}/{today}"
schedule: "0 21 * * 2"
target_table: "steam_best_seller_list_weekly"
table_schema:
  columns:
    - name: id
      type: INTEGER
      constraint: PRIMARY KEY AUTOINCREMENT
    - name: steam_id
      type: INTEGER
    - name: rank
      type: INTEGER
    - name: region
      type: TEXT
    - name: crawled_at
      type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
  indexes:
    - name: idx_uk_steam_id_region_crawled_at
      columns: [steam_id, region, crawled_at]
      unique: true
parser:
  type: html_table
  row_selector: "table._3arZn0BMPzyhcYNADe193m tbody tr"
  filters:
    skip_lines: 1
    where:
      - field: steam_id
        op: "in"
        value: [1974050, 2315040, 4025700]
  fields:
    - name: steam_id
      column: 2
      selector: "a"
      attr: "href"
      regex_extract: "/app/(\\d+)"
      to_number: true
    - name: rank
      column: 1
      strip: true
      to_number: true
    - name: region
      value: "{region}"
      strip: true
anti_spider:
  enabled: false
  delay:
    - 1
    - 3
  rotate_user_agent: false
  use_proxy: false
retry:
  max_attempts: 3
  backoff_base: 2.0