name: "Steam游戏每小时峰值玩家采集任务"
type: api
method: GET
iterate:
  var_name: "steam_id"
  values:
    - 1974050    # 火炬之光 国际服
    - 2315040    # 火炬之光 国服
    - 4025700    # 心动小镇 国际服
url: "https://steamcharts.com/app/{steam_id}/chart-data.json"
schedule: "35 * * * *"
target_table: "steam_game_peak_players_hourly"
table_schema:
  columns:
    - name: id
      type: INTEGER
      constraint: PRIMARY KEY AUTOINCREMENT
    - name: steam_id
      type: INTEGER
    - name: stat_ts
      type: INTEGER
    - name: peak_players
      type: INTEGER
    - name: crawled_at
      type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
  indexes:
    - name: idx_uk_steam_id_stat_ts
      columns: [steam_id, stat_ts]
      unique: true
parser:
  type: json
  root_path: ""                        # JSON 本身是数组，不需要路径定位
  array_index_mapping: true            # 每个元素是 [ts, players] 格式
  filters:                             # 数据过滤（可选）
    tail: 24                           # 只保留最近24条
  fields:
    - name: steam_id
      value: "{steam_id}"              # 引用迭代变量
    - name: stat_ts
      position: 0                      # 数组第一个元素（时间戳）
    - name: peak_players
      position: 1                      # 数组第二个元素（峰值玩家数）
anti_spider:
  enabled: true
  delay: [2, 5]                        # Steam 有频率限制，加长延迟
retry:
  max_attempts: 3
  backoff_base: 2.0