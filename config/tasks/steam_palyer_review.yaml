name: "Steam游戏玩家每日评价采集任务"
type: api
method: GET
iterate:
  var_name: "steam_id"
  values: 
    - 1974050    # 火炬之光 国际服
    - 2315040    # 火炬之光 国服
    - 4025700    # 心动小镇 国际服
url: "https://store.steampowered.com/appreviewhistogram/{steam_id}"
schedule: "0 */6 * * *"
outputs:
  - target_table: "steam_player_review_recent"
    table_schema:
      columns:
        - name: id
          type: INTEGER
          constraint: PRIMARY KEY AUTOINCREMENT
        - name: steam_id
          type: INTEGER
        - name: stat_ts
          type: INTEGER
        - name: up
          type: INTEGER
        - name: down
          type: INTEGER
        - name: crawled_at
          type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
      indexes:
        - name: idx_uk_steam_id_stat_ts
          columns: [steam_id, stat_ts]
          unique: true
    parser:
      type: json
      root_path: "results.recent"
      fields:
        - name: steam_id
          value: "{steam_id}"
        - name: stat_ts
          path: "date"
        - name: up
          path: "recommendations_up"
        - name: down
          path: "recommendations_down"

  - target_table: "steam_player_review_rollup"
    table_schema:
      columns:
        - name: id
          type: INTEGER
          constraint: PRIMARY KEY AUTOINCREMENT
        - name: steam_id
          type: INTEGER
        - name: stat_ts
          type: INTEGER
        - name: up
          type: INTEGER
        - name: down
          type: INTEGER
        - name: crawled_at
          type: TEXT NOT NULL DEFAULT (datetime('now', 'localtime'))
      indexes:
        - name: idx_uk_steam_id_stat_ts
          columns: [steam_id, stat_ts]
          unique: true
    parser:
      type: json
      root_path: "results.rollups"
      fields:
        - name: steam_id
          value: "{steam_id}"
        - name: stat_ts
          path: "date"
        - name: up
          path: "recommendations_up"
        - name: down
          path: "recommendations_down"
anti_spider:
  enabled: true
  delay: [2, 5]
retry:
  max_attempts: 3
  backoff_base: 2.0