<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务管理</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard/"><i class="bi bi-activity me-2"></i>Crawler</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/dashboard/">仪表盘</a>
            <a class="nav-link active" href="/dashboard/tasks.html">任务</a>
            <a class="nav-link" href="/dashboard/data.html">数据</a>
            <a class="nav-link" href="/dashboard/logs.html">日志</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4 page-content">
    <h4 class="mb-4 fw-bold">任务管理</h4>

    <div class="table-responsive card">
        <div class="card-body">
        <table class="table table-hover mb-0">
            <thead><tr><th>名称</th><th>类型</th><th>目标表</th><th>调度</th><th style="width:160px">操作</th></tr></thead>
            <tbody id="taskList"><tr><td colspan="5" class="text-muted text-center">加载中...</td></tr></tbody>
        </table>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">任务详情</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body"><pre id="detailContent" class="bg-light p-3 rounded" style="max-height:60vh;overflow:auto;"></pre></div>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert"><div class="toast-body" id="toastMsg"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/api.js"></script>
<script>
(async () => {
    try {
        const res = await apiGet('/tasks');
        const tbody = document.getElementById('taskList');
        if (res.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-muted text-center">暂无任务</td></tr>';
            return;
        }
        tbody.innerHTML = res.data.map(t => `
            <tr>
                <td><strong>${esc(t.name)}</strong></td>
                <td><span class="badge bg-secondary">${t.type}</span></td>
                <td><code>${esc(t.target_table || '-')}</code></td>
                <td><code>${esc(t.schedule)}</code></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="viewDetail('${esc(t.name)}')"><i class="bi bi-eye"></i></button>
                    <button class="btn btn-sm btn-outline-success" onclick="triggerRun('${esc(t.name)}')"><i class="bi bi-play-fill"></i></button>
                </td>
            </tr>
        `).join('');
    } catch(e) {
        document.getElementById('taskList').innerHTML = `<tr><td colspan="5" class="text-danger text-center">加载失败: ${esc(e.message)}</td></tr>`;
    }
})();

async function viewDetail(name) {
    try {
        const res = await apiGet(`/tasks/${encodeURIComponent(name)}`);
        document.getElementById('detailContent').textContent = JSON.stringify(res.data, null, 2);
        new bootstrap.Modal('#detailModal').show();
    } catch(e) { toast(e.message, 'danger'); }
}

async function triggerRun(name) {
    if (!confirm(`确认立即执行任务: ${name}?`)) return;
    try {
        const res = await apiPost(`/tasks/${encodeURIComponent(name)}/run`);
        toast(`任务执行完毕 — 新增 ${res.data.new}, 更新 ${res.data.updated}, 跳过 ${res.data.skipped}`, 'success');
    } catch(e) { toast('执行失败: ' + e.message, 'danger'); }
}

function toast(msg, type) {
    const el = document.getElementById('toastMsg');
    el.textContent = msg; el.className = `toast-body text-${type}`;
    new bootstrap.Toast('#liveToast').show();
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
