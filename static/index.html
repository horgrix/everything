<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crawler Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard/"><i class="bi bi-activity me-2"></i>Crawler</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/dashboard/">仪表盘</a>
            <a class="nav-link" href="/dashboard/tasks.html">任务</a>
            <a class="nav-link" href="/dashboard/data.html">数据</a>
            <a class="nav-link" href="/dashboard/logs.html">日志</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4 page-content">
    <h4 class="mb-4 fw-bold">仪表盘</h4>

    <!-- 统计卡片 -->
    <div class="row g-3 mb-4" id="statCards">
        <div class="col-lg-3 col-md-6">
            <div class="card stat-card">
                <div class="card-body">
                    <div class="card-title">任务总数</div>
                    <div class="card-text" id="statTasks">-</div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="card stat-card" style="border-left-color: #198754;">
                <div class="card-body">
                    <div class="card-title">已启用</div>
                    <div class="card-text" id="statEnabled">-</div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="card stat-card" style="border-left-color: #6f42c1;">
                <div class="card-body">
                    <div class="card-title">业务表</div>
                    <div class="card-text" id="statTables">-</div>
                </div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="card stat-card" style="border-left-color: #fd7e14;">
                <div class="card-body">
                    <div class="card-title">数据库大小</div>
                    <div class="card-text" id="statDbSize">-</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <!-- 执行趋势图 -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title mb-3">最近执行趋势</h6>
                    <div id="trendChart" class="chart-container"></div>
                </div>
            </div>
        </div>

        <!-- 任务状态分布 -->
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-body">
                    <h6 class="card-title mb-3">任务状态</h6>
                    <div id="statusChart" class="chart-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 最近日志 -->
    <div class="card mt-3">
        <div class="card-body">
            <h6 class="card-title mb-3">最近执行日志</h6>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead><tr><th>任务</th><th>状态</th><th>新增</th><th>更新</th><th>耗时</th><th>时间</th></tr></thead>
                    <tbody id="recentLogs"><tr><td colspan="6" class="text-muted text-center">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.1/dist/apexcharts.min.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/charts.js"></script>
<script>
(async () => {
    // 统计卡片
    try {
        const status = await apiGet('/system/status');
        document.getElementById('statTasks').textContent = status.data.tasks_total;
        document.getElementById('statEnabled').textContent = status.data.tasks_enabled;
        document.getElementById('statTables').textContent = status.data.business_tables;
        document.getElementById('statDbSize').textContent = status.data.db_size_mb + ' MB';
    } catch(e) { console.error(e); }

    // 最近日志
    try {
        const logs = await apiGet('/logs', { limit: 10 });
        const tbody = document.getElementById('recentLogs');
        if (logs.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-muted text-center">暂无数据</td></tr>';
        } else {
            tbody.innerHTML = logs.data.map(l => `
                <tr>
                    <td>${esc(l.task_name || '-')}</td>
                    <td><span class="badge badge-status bg-${l.status === 'success' ? 'success' : l.status === 'failed' ? 'danger' : 'warning'}">${l.status}</span></td>
                    <td>${l.records_new || 0}</td>
                    <td>${l.records_updated || 0}</td>
                    <td>${l.duration_ms ? (l.duration_ms / 1000).toFixed(1) + 's' : '-'}</td>
                    <td class="text-muted">${l.run_time || '-'}</td>
                </tr>
            `).join('');
        }
    } catch(e) { console.error(e); }

    // 执行趋势 + 状态分布（从 /api/system/dashboard 获取）
    try {
        const dash = await apiGet('/system/dashboard');
        const d = dash.data;

        // 执行趋势图
        const trend = d.trend_days.length > 0
            ? barChart(document.querySelector('#trendChart'), {
                series: [
                    { name: '执行次数', data: d.trend_exec },
                    { name: '新增记录', data: d.trend_new },
                    { name: '更新记录', data: d.trend_upd },
                ],
                xaxis: { categories: d.trend_days },
            })
            : null;

        // 任务状态分布
        const total = d.status_series.reduce((a, b) => a + b, 0);
        const statusChart = total > 0
            ? donutChart(document.querySelector('#statusChart'), {
                series: d.status_series,
                labels: d.status_labels,
            })
            : null;

        renderCharts([trend, statusChart].filter(Boolean));
    } catch(e) { console.error('Dashboard charts:', e); }
})();

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>
</body>
</html>
