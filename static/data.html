<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据浏览</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard/"><i class="bi bi-activity me-2"></i>Crawler</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/dashboard/">仪表盘</a>
            <a class="nav-link" href="/dashboard/tasks.html">任务</a>
            <a class="nav-link active" href="/dashboard/data.html">数据</a>
            <a class="nav-link" href="/dashboard/logs.html">日志</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4 page-content">
    <h4 class="mb-4 fw-bold">数据浏览</h4>

    <!-- 选择表和视图 -->
    <div class="row g-3 mb-3">
        <div class="col-md-4">
            <label class="form-label small">业务表</label>
            <select class="form-select" id="tableSelect" onchange="onTableChange()"><option value="">请选择...</option></select>
        </div>
        <div class="col-md-4">
            <label class="form-label small">视图模式</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="viewMode" id="viewTable" value="table" checked onchange="onViewChange()">
                <label class="btn btn-outline-secondary" for="viewTable"><i class="bi bi-table me-1"></i>表格</label>
                <input type="radio" class="btn-check" name="viewMode" id="viewChart" value="chart" onchange="onViewChange()">
                <label class="btn btn-outline-secondary" for="viewChart"><i class="bi bi-bar-chart-fill me-1"></i>图表</label>
            </div>
        </div>
    </div>

    <!-- 表格视图 -->
    <div id="tableView">
        <!-- 筛选栏 -->
        <div class="card mb-3">
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-3"><label class="form-label small">返回字段</label><input class="form-control" id="qFields" placeholder="留空=全部，例: steam_id,peak_players"></div>
                    <div class="col-md-3"><label class="form-label small">排序</label><input class="form-control" id="qOrder" placeholder="例: peak_players DESC"></div>
                    <div class="col-md-3"><label class="form-label small">筛选 (JSON)</label><input class="form-control" id="qWhere" placeholder="[{&quot;col&quot;:&quot;steam_id&quot;,&quot;op&quot;:&quot;=&quot;,&quot;value&quot;:1}]" title="格式: [{&quot;col&quot;:&quot;字段&quot;,&quot;op&quot;:&quot;运算符&quot;,&quot;value&quot;:值}] 运算符: = != &gt; &lt; &gt;= &lt;= IN NOT IN LIKE BETWEEN IS NULL"></div>
                    <div class="col-md-2"><label class="form-label small">每页</label><select class="form-select" id="qLimit"><option value="20">20</option><option value="50" selected>50</option><option value="100">100</option></select></div>
                    <div class="col-md-2 pt-md-4"><button class="btn btn-primary w-100" onclick="loadData()">查询</button></div>
                </div>
            </div>
        </div>
        <!-- 数据表格 -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="dataTable"><thead id="dataThead"></thead><tbody id="dataTbody"><tr><td colspan="10" class="text-muted text-center">请选择业务表</td></tr></tbody></table>
                </div>
                <nav class="mt-3"><ul class="pagination justify-content-center mb-0" id="dataPagination"></ul></nav>
            </div>
        </div>
    </div>

    <!-- 图表视图 -->
    <div id="chartView" style="display:none;">
        <div class="card mb-3">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-2"><label class="form-label small">X 轴字段</label><select class="form-select" id="chXCol"><option value="">请选择...</option></select></div>
                    <div class="col-md-2"><label class="form-label small">Y 轴字段</label><select class="form-select" id="chYCol"><option value="">请选择...</option></select></div>
                    <div class="col-md-2"><label class="form-label small">图例字段（可选）</label><select class="form-select" id="chSeriesCol"><option value="">无（单线）</option></select></div>
                    <div class="col-md-3"><label class="form-label small">筛选 (JSON)</label><input class="form-control" id="chWhere" placeholder='[{"col":"steam_id","op":"=","value":1}]'></div>
                    <div class="col-md-3 pt-md-4"><button class="btn btn-primary w-100" onclick="loadChart()"><i class="bi bi-bar-chart-line-fill me-1"></i>绘制图表</button></div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div id="dataChart" class="chart-container"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.1/dist/apexcharts.min.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/charts.js"></script>
<script>
let currentTable = '', currentPage = 0, chartInstance = null;

(async () => {
    try {
        const res = await apiGet('/data/tables');
        const sel = document.getElementById('tableSelect');
        res.data.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
    } catch(e) { console.error(e); }
})();

function onTableChange() {
    currentTable = document.getElementById('tableSelect').value;
    currentPage = 0;
    if (currentTable) loadData();
}

function onViewChange() {
    const mode = document.querySelector('input[name="viewMode"]:checked').value;
    document.getElementById('tableView').style.display = mode === 'table' ? '' : 'none';
    document.getElementById('chartView').style.display = mode === 'chart' ? '' : 'none';
    if (mode === 'chart' && currentTable) loadColumns();
}

async function loadColumns() {
    if (!currentTable) return;
    try {
        const res = await apiGet(`/data/${currentTable}/columns`);
        const cols = res.data;
        const xSel = document.getElementById('chXCol'), ySel = document.getElementById('chYCol'), sSel = document.getElementById('chSeriesCol');
        // Preserve selected values
        const xVal = xSel.value, yVal = ySel.value, sVal = sSel.value;
        const numericCols = cols.filter(c => ['INTEGER','REAL','FLOAT','DOUBLE','NUMERIC'].includes((c.type||'').toUpperCase()) || c.name.endsWith('_id'));
        const allOpts = cols.map(c => `<option value="${esc(c.name)}">${esc(c.name)} (${c.type||'TEXT'})</option>`).join('');
        const numOpts = numericCols.map(c => `<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
        xSel.innerHTML = '<option value="">请选择...</option>' + allOpts;
        ySel.innerHTML = '<option value="">请选择...</option>' + numOpts;
        sSel.innerHTML = '<option value="">无（单线）</option>' + allOpts;
        if (xVal && cols.some(c => c.name === xVal)) xSel.value = xVal;
        if (yVal && numericCols.some(c => c.name === yVal)) ySel.value = yVal;
        if (sVal && cols.some(c => c.name === sVal)) sSel.value = sVal;
    } catch(e) { console.error(e); }
}

async function loadData(page = 0) {
    currentPage = page;
    if (!currentTable) return;
    const params = { limit: parseInt(document.getElementById('qLimit').value), offset: page * parseInt(document.getElementById('qLimit').value) };
    const fields = document.getElementById('qFields').value.trim();
    if (fields) params.fields = fields;
    const order = document.getElementById('qOrder').value.trim();
    if (order) params.order_by = order;
    const where = document.getElementById('qWhere').value.trim();
    if (where) params.where = where;

    try {
        const res = await apiGet(`/data/${currentTable}/query`, params);
        renderDataTable(res.data, res.total, params.limit, page);
        renderPagination(res.total, params.limit, page, 'dataPagination', loadData);
    } catch(e) {
        document.getElementById('dataTbody').innerHTML = `<tr><td colspan="10" class="text-danger text-center">${esc(e.message)}</td></tr>`;
    }
}

function renderDataTable(data, total, limit, page) {
    const thead = document.getElementById('dataThead'), tbody = document.getElementById('dataTbody');
    if (data.length === 0) {
        thead.innerHTML = ''; tbody.innerHTML = '<tr><td class="text-muted text-center">无数据</td></tr>';
        return;
    }
    const keys = Object.keys(data[0]);
    thead.innerHTML = '<tr>' + keys.map(k => `<th>${esc(k)}</th>`).join('') + '</tr>';
    tbody.innerHTML = data.map(row => '<tr>' + keys.map(k => `<td class="small">${esc(String(row[k] ?? ''))}</td>`).join('') + '</tr>').join('');
}

function renderPagination(total, limit, page, containerId, fn) {
    const pages = Math.ceil(total / limit);
    const ul = document.getElementById(containerId);
    if (pages <= 1) { ul.innerHTML = ''; return; }
    let html = '';
    for (let i = 0; i < pages; i++) {
        html += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" onclick="${fn.name}(${i});return false">${i + 1}</a></li>`;
    }
    ul.innerHTML = html;
}

async function loadChart() {
    if (!currentTable) return;
    const xCol = document.getElementById('chXCol').value;
    const yCol = document.getElementById('chYCol').value;
    const seriesCol = document.getElementById('chSeriesCol').value;
    const where = document.getElementById('chWhere').value.trim();
    if (!xCol) return alert('请选择 X 轴字段');
    if (!yCol) return alert('请选择 Y 轴字段');

    const params = {};
    if (seriesCol) {
        params.fields = [xCol, yCol, seriesCol].join(',');
        params.order_by = xCol;
    } else {
        params.fields = [xCol, yCol].join(',');
    }
    if (where) params.where = where;
    params.limit = 500;

    try {
        const res = await apiGet(`/data/${currentTable}/query`, params);
        if (res.data.length === 0) return alert('无数据');

        if (chartInstance) chartInstance.destroy();

        if (seriesCol) {
            const groups = {};
            for (const row of res.data) {
                const key = String(row[seriesCol] ?? 'null');
                if (!groups[key]) groups[key] = { name: key, data: [] };
                groups[key].data.push({ x: row[xCol], y: parseFloat(row[yCol]) || 0 });
            }
            const series = Object.values(groups);
            const anns = series.map((s, i) => {
                const mean = s.data.reduce((sum, d) => sum + d.y, 0) / s.data.length;
                return { y: mean, borderColor: CHART_COLORS[i % CHART_COLORS.length], strokeDashArray: 4, label: { text: `${s.name} 均值: ${mean.toFixed(1)}`, style: { color: '#fff', background: CHART_COLORS[i % CHART_COLORS.length] } } };
            });
            chartInstance = lineChart(document.querySelector('#dataChart'), {
                chart: { height: 750 },
                series: series,
                xaxis: { type: (typeof res.data[0][xCol]) === 'number' ? 'numeric' : 'category', labels: { rotate: -45 } },
                stroke: { width: 2, curve: 'smooth' },
                legend: { position: 'top' },
                tooltip: { shared: true, intersect: false },
                annotations: { yaxis: anns },
            });
        } else {
            const dataArr = res.data.map(r => ({ x: r[xCol], y: parseFloat(r[yCol]) || 0 }));
            const mean = dataArr.reduce((sum, d) => sum + d.y, 0) / dataArr.length;
            chartInstance = lineChart(document.querySelector('#dataChart'), {
                chart: { height: 750 },
                series: [{ name: yCol, data: dataArr }],
                xaxis: { type: (typeof res.data[0][xCol]) === 'number' ? 'numeric' : 'category', labels: { rotate: -45 } },
                stroke: { width: 2, curve: 'smooth' },
                legend: { position: 'top' },
                tooltip: { shared: true, intersect: false },
                annotations: { yaxis: [{ y: mean, borderColor: CHART_COLORS[0], strokeDashArray: 4, label: { text: `${yCol} 均值: ${mean.toFixed(1)}`, style: { color: '#fff', background: CHART_COLORS[0] } } }] },
            });
        }
        chartInstance.render();
    } catch(e) { alert('绘图失败: ' + e.message); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
